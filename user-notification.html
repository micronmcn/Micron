<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micron Notifications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bg-gradient-brand {
            background: linear-gradient(135deg, #FF8C00, #FFD700);
        }
        .text-gradient-brand {
            background: linear-gradient(135deg, #FF8C00, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .modal-active {
            display: flex !important;
        }
        #undo-banner {
            display: none;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <header class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-gradient-brand rounded-lg flex items-center justify-center text-white font-bold">M</div>
                <span class="text-xl font-bold tracking-tight text-gray-800">MICRON</span>
            </div>

            <div class="relative">
                <button onclick="toggleMenu()" class="p-2 hover:bg-gray-100 rounded-full transition">
                    <i class="fa-solid fa-ellipsis-vertical text-gray-600 text-xl"></i>
                </button>
                <div id="nav-menu" class="hidden absolute right-0 mt-2 w-48 bg-white border rounded-lg shadow-xl py-2">
                    <a href="#" class="block px-4 py-2 hover:bg-orange-50 text-gray-700">Profile Settings</a>
                    <a href="#" class="block px-4 py-2 hover:bg-orange-50 text-gray-700">Account Security</a>
                    <a href="#" class="block px-4 py-2 hover:bg-orange-50 text-gray-700">Preferences</a>
                </div>
            </div>
        </div>
    </header>

    <section class="bg-white border-b shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-6 flex items-center justify-between">
            <nav class="flex items-center text-sm font-medium">
                <span class="text-gray-400">Home</span>
                <i class="fa-solid fa-chevron-right mx-2 text-xs text-gray-300"></i>
                <span class="text-orange-600">Notifications</span>
            </nav>
            <button id="clear-btn" onclick="startClearProcess()" class="px-4 py-2 text-sm font-semibold text-orange-600 hover:bg-orange-50 border border-orange-200 rounded-full transition">
                Clear All
            </button>
        </div>
    </section>

    <main class="max-w-2xl mx-auto px-4 py-8 min-h-[60vh]">
        <div id="undo-banner" class="mb-4 p-4 bg-gray-800 text-white rounded-lg flex justify-between items-center animate-bounce">
            <span>Notifications cleared successfully.</span>
            <button onclick="undoDelete()" class="font-bold text-yellow-400 hover:text-yellow-300">UNDO</button>
        </div>

        <div id="selection-bar" class="hidden mb-4 p-3 bg-orange-100 border border-orange-200 rounded-lg flex justify-between items-center">
            <span class="text-orange-800 font-medium">Select notifications to delete</span>
            <div class="flex gap-2">
                <button onclick="confirmDelete()" class="px-3 py-1 bg-red-500 text-white text-xs rounded shadow">Confirm Delete</button>
                <button onclick="cancelSelection()" class="px-3 py-1 bg-white text-gray-600 text-xs rounded border shadow">Cancel</button>
            </div>
        </div>

        <div id="notification-container" class="space-y-4">
            </div>
    </main>

    <div id="detail-modal" class="hidden fixed inset-0 bg-black/50 items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-2xl w-full max-w-md overflow-hidden shadow-2xl">
            <div class="h-2 bg-gradient-brand"></div>
            <div class="p-6">
                <div class="flex justify-between items-start mb-4">
                    <h3 id="modal-title" class="text-xl font-bold text-gray-800"></h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
                </div>
                <p id="modal-time" class="text-xs text-orange-500 font-semibold mb-3 uppercase tracking-wider"></p>
                <p id="modal-desc" class="text-gray-600 leading-relaxed mb-6"></p>
                <button onclick="closeModal()" class="w-full py-3 bg-gradient-brand text-white font-bold rounded-xl shadow-lg">Close</button>
            </div>
        </div>
    </div>

    <footer class="bg-white border-t mt-12 py-10">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <div class="flex flex-wrap justify-center gap-6 mb-6 text-sm font-medium text-gray-500">
                <a href="javascript:void(0)" onclick="alert('Privacy Policy Details')" class="hover:text-orange-500">Privacy & Policy</a>
                <a href="javascript:void(0)" onclick="alert('Terms & Conditions Details')" class="hover:text-orange-500">Terms & Conditions</a>
                <a href="#" class="hover:text-orange-500">Help Center</a>
                <a href="#" class="hover:text-orange-500">Contact Us</a>
            </div>
            <p class="text-gray-400 text-xs">&copy; 2026 Micron | All Rights Reserved</p>
        </div>
    </footer>

    <script>
        // Sample Data
        let notifications = [
            { id: 1, title: "System Update", time: "1min ago", detail: "A new system security patch has been successfully applied to your Micron account." },
            { id: 2, title: "New Login Detected", time: "1hour ago", detail: "We noticed a login to your account from a new Chrome browser on Windows." },
            { id: 3, title: "Subscription Renewed", time: "1day ago", detail: "Your annual Micron Pro subscription has been renewed automatically. Receipt sent to email." },
            { id: 4, title: "Spring Sale", time: "1month ago", detail: "Get 50% off on all Micron hardware accessories during our annual Spring event!" },
            { id: 5, title: "Account Created", time: "1year ago", detail: "Welcome to the Micron family! Your account was officially registered on this date." }
        ];

        let deletedBackup = [];

        // Render Notifications
        function renderNotifications(isSelectionMode = false) {
            const container = document.getElementById('notification-container');
            container.innerHTML = '';

            if (notifications.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-gray-400">No notifications found</div>`;
                return;
            }

            notifications.forEach(n => {
                const item = document.createElement('div');
                item.className = "bg-white p-4 rounded-xl border border-gray-100 shadow-sm hover:shadow-md transition cursor-pointer flex items-center gap-4 group";
                
                let content = `
                    <div class="w-10 h-10 rounded-full bg-orange-50 flex items-center justify-center text-orange-500 group-hover:bg-gradient-brand group-hover:text-white transition">
                        <i class="fa-solid fa-bell"></i>
                    </div>
                    <div class="flex-1" onclick="${isSelectionMode ? '' : `openModal(${n.id})`}">
                        <h4 class="font-bold text-gray-800">${n.title}</h4>
                        <p class="text-xs text-gray-400">${n.time}</p>
                    </div>
                `;

                if (isSelectionMode) {
                    content = `<input type="checkbox" class="w-5 h-5 accent-orange-500" value="${n.id}">` + content;
                }

                item.innerHTML = content;
                container.appendChild(item);
            });
        }

        // Logic Functions
        function toggleMenu() {
            document.getElementById('nav-menu').classList.toggle('hidden');
        }

        function openModal(id) {
            const n = notifications.find(x => x.id === id);
            document.getElementById('modal-title').innerText = n.title;
            document.getElementById('modal-time').innerText = n.time;
            document.getElementById('modal-desc').innerText = n.detail;
            document.getElementById('detail-modal').classList.add('modal-active');
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.remove('modal-active');
        }

        function startClearProcess() {
            document.getElementById('selection-bar').classList.remove('hidden');
            renderNotifications(true);
        }

        function cancelSelection() {
            document.getElementById('selection-bar').classList.add('hidden');
            renderNotifications(false);
        }

        function confirmDelete() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
            const idsToDelete = Array.from(checkboxes).map(cb => parseInt(cb.value));
            
            if (idsToDelete.length === 0) {
                alert("Please select notifications to delete.");
                return;
            }

            deletedBackup = notifications.filter(n => idsToDelete.includes(n.id));
            notifications = notifications.filter(n => !idsToDelete.includes(n.id));
            
            document.getElementById('selection-bar').classList.add('hidden');
            document.getElementById('undo-banner').style.display = 'flex';
            renderNotifications();

            // Hide undo banner after 10 seconds
            setTimeout(() => {
                document.getElementById('undo-banner').style.display = 'none';
            }, 10000);
        }

        function undoDelete() {
            notifications = [...notifications, ...deletedBackup];
            notifications.sort((a, b) => a.id - b.id); // Simple sort to keep order
            deletedBackup = [];
            document.getElementById('undo-banner').style.display = 'none';
            renderNotifications();
        }

        // Initialize
        renderNotifications();

        // Close dropdown when clicking outside
        window.onclick = function(event) {
            if (!event.target.closest('.relative')) {
                document.getElementById('nav-menu').classList.add('hidden');
            }
        }
    </script>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzJp8kF70oGHnstQh_9InUYvMpVZyuCV5h2gneT6Eikpcq92vJKzPRPrs81UfkvQj-mmA/exec";
let notifications = [];
let userEmail = "";

// 1. Check Login and Fetch Data
window.onload = async function() {
    const user = JSON.parse(localStorage.getItem("micronUser"));
    if (!user) {
        window.location.href = "index.html";
        return;
    }
    userEmail = user.email;
    await fetchNotifications();
};

async function fetchNotifications() {
    const container = document.getElementById('notification-container');
    container.innerHTML = `<div class="text-center py-20 text-gray-400">Loading notifications...</div>`;
    
    try {
        const response = await fetch(`${SCRIPT_URL}?action=getNotifications&email=${userEmail}`);
        notifications = await response.json();
        renderNotifications();
    } catch (e) {
        container.innerHTML = `<div class="text-center py-20 text-red-400">Error loading data</div>`;
    }
}

function renderNotifications(isSelectionMode = false) {
    const container = document.getElementById('notification-container');
    container.innerHTML = '';

    if (notifications.length === 0) {
        container.innerHTML = `<div class="text-center py-20 text-gray-400">No notifications found</div>`;
        return;
    }

    notifications.forEach(n => {
        const item = document.createElement('div');
        item.className = "bg-white p-4 rounded-xl border border-gray-100 shadow-sm hover:shadow-md transition cursor-pointer flex items-center gap-4 group";
        
        let content = `
            <div class="w-10 h-10 rounded-full bg-orange-50 flex items-center justify-center text-orange-500 group-hover:bg-gradient-brand group-hover:text-white transition">
                <i class="fa-solid fa-bell"></i>
            </div>
            <div class="flex-1" onclick="${isSelectionMode ? '' : `openModal(${n.id})`}">
                <h4 class="font-bold text-gray-800">${n.title}</h4>
                <p class="text-xs text-gray-400">${n.time}</p>
            </div>
        `;

        if (isSelectionMode) {
            content = `<input type="checkbox" class="w-5 h-5 accent-orange-500" value="${n.id}">` + content;
        }

        item.innerHTML = content;
        container.appendChild(item);
    });
}

// 2. Clear from Google Sheets
async function confirmDelete() {
    const btn = document.querySelector("#selection-bar button");
    btn.innerText = "Processing...";

    try {
        const response = await fetch(`${SCRIPT_URL}?action=clearNotifications`, {
            method: 'POST',
            body: JSON.stringify({ email: userEmail })
        });
        const result = await response.json();
        
        if (result.result === "success") {
            notifications = [];
            document.getElementById('selection-bar').classList.add('hidden');
            document.getElementById('undo-banner').style.display = 'flex';
            renderNotifications();
        }
    } catch (e) {
        alert("Failed to clear notifications");
    }
    btn.innerText = "Confirm Delete";
}

// Keep existing UI functions (toggleMenu, openModal, closeModal, etc.)
function toggleMenu() { document.getElementById('nav-menu').classList.toggle('hidden'); }
function openModal(id) {
    const n = notifications.find(x => x.id === id);
    document.getElementById('modal-title').innerText = n.title;
    document.getElementById('modal-time').innerText = n.time;
    document.getElementById('modal-desc').innerText = n.detail;
    document.getElementById('detail-modal').classList.add('modal-active');
}
function closeModal() { document.getElementById('detail-modal').classList.remove('modal-active'); }
function startClearProcess() { 
    document.getElementById('selection-bar').classList.remove('hidden'); 
    renderNotifications(true); 
}
function cancelSelection() { 
    document.getElementById('selection-bar').classList.add('hidden'); 
    renderNotifications(false); 
}
          
    </script>
</body>
</html>
