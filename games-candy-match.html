<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Candy Crush Full Game</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
  text-align: center;
}

#topbar {
  display: flex;
  justify-content: space-around;
  padding: 12px;
  background: white;
  font-weight: bold;
}

#game {
  display: grid;
  grid-template-columns: repeat(8, 60px);
  gap: 6px;
  justify-content: center;
  margin-top: 20px;
}

.cell {
  width: 60px;
  height: 60px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
}

.cell:active { transform: scale(0.9); }

.red { background:#ff4d4d; }
.blue { background:#4da6ff; }
.green { background:#4dff88; }
.yellow { background:#ffd24d; }
.purple { background:#b84dff; }

/* SPECIALS */
.striped { border:3px solid white; }
.wrapped { box-shadow:0 0 10px black; }
.bomb { background:black !important; }

.selected { outline:3px solid black; }

/* POPUP */
#popup {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
}

#popupContent {
  background:white;
  padding:30px;
  border-radius:15px;
}

button {
  padding:10px 20px;
  border:none;
  background:#ff6f61;
  color:white;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="topbar">
  <div>Level: <span id="level">1</span></div>
  <div>Score: <span id="score">0</span></div>
  <div>Moves: <span id="moves">20</span></div>
</div>

<div id="game"></div>

<div id="popup">
  <div id="popupContent">
    <h2 id="resultText"></h2>
    <button onclick="nextLevel()">Next Level</button>
  </div>
</div>

<script>
const ROWS=8, COLS=8;
const types=["red","blue","green","yellow","purple"];

let board=[], selected=null;
let level=1, score=0, moves=20, target=500;
let combo=1;

function createCandy(type,special=null){
  return {type,special};
}

function randomCandy(){
  return createCandy(types[Math.floor(Math.random()*types.length)]);
}

function createBoard(){
  board=[];
  for(let r=0;r<ROWS;r++){
    board[r]=[];
    for(let c=0;c<COLS;c++){
      board[r][c]=randomCandy();
    }
  }
}

function render(){
  const g=document.getElementById("game");
  g.innerHTML="";

  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      let cell=document.createElement("div");
      let candy=board[r][c];

      cell.className="cell "+(candy?candy.type:"");

      if(candy && candy.special)
        cell.classList.add(candy.special);

      if(selected && selected[0]==r && selected[1]==c)
        cell.classList.add("selected");

      cell.onclick=()=>clickCell(r,c);
      g.appendChild(cell);
    }
  }

  levelEl.innerText=level;
  scoreEl.innerText=score;
  movesEl.innerText=moves;
}

function swap(r1,c1,r2,c2){
  [board[r1][c1],board[r2][c2]]=[board[r2][c2],board[r1][c1]];
}

function adjacent(r1,c1,r2,c2){
  return Math.abs(r1-r2)+Math.abs(c1-c2)==1;
}

/* MATCH */
function findMatches(){
  let m=[];

  for(let r=0;r<ROWS;r++){
    let count=1;
    for(let c=0;c<COLS;c++){
      if(c<COLS-1 && board[r][c] && board[r][c].type===board[r][c+1].type){
        count++;
      } else {
        if(count>=3){
          let g=[];
          for(let k=0;k<count;k++) g.push([r,c-k]);
          m.push(g);
        }
        count=1;
      }
    }
  }

  for(let c=0;c<COLS;c++){
    let count=1;
    for(let r=0;r<ROWS;r++){
      if(r<ROWS-1 && board[r][c] && board[r][c].type===board[r+1][c].type){
        count++;
      } else {
        if(count>=3){
          let g=[];
          for(let k=0;k<count;k++) g.push([r-k,c]);
          m.push(g);
        }
        count=1;
      }
    }
  }

  return m;
}

/* SPECIAL EFFECT */
function activateSpecial(r,c){
  let candy=board[r][c];
  if(!candy || !candy.special) return;

  if(candy.special==="striped"){
    for(let i=0;i<COLS;i++) board[r][i]=null;
  }

  if(candy.special==="bomb"){
    let t=candy.type;
    for(let i=0;i<ROWS;i++){
      for(let j=0;j<COLS;j++){
        if(board[i][j] && board[i][j].type===t)
          board[i][j]=null;
      }
    }
  }
}

/* CLEAR */
function clearMatches(matches){
  matches.forEach(g=>{
    let special=null;

    if(g.length==4) special="striped";
    if(g.length>=5) special="bomb";

    let [r,c]=g[0];

    g.forEach(([x,y])=>{
      activateSpecial(x,y);
      board[x][y]=null;
    });

    if(special)
      board[r][c]=createCandy(randomCandy().type,special);

    score += g.length*20*combo;
  });
}

/* GRAVITY */
function gravity(){
  for(let c=0;c<COLS;c++){
    for(let r=ROWS-1;r>=0;r--){
      if(!board[r][c]){
        for(let k=r-1;k>=0;k--){
          if(board[k][c]){
            board[r][c]=board[k][c];
            board[k][c]=null;
            break;
          }
        }
      }
    }
  }
}

function refill(){
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(!board[r][c])
        board[r][c]=randomCandy();
    }
  }
}

function process(){
  combo=1;
  let m;
  do{
    m=findMatches();
    if(m.length){
      clearMatches(m);
      gravity();
      refill();
      combo++;
    }
  }while(m.length);
}

/* COMBO SWAP */
function comboSwap(r1,c1,r2,c2){
  let A=board[r1][c1], B=board[r2][c2];

  if(A.special==="bomb" && B.special==="bomb"){
    for(let i=0;i<ROWS;i++)
      for(let j=0;j<COLS;j++)
        board[i][j]=null;
    score+=500;
    return true;
  }

  if(A.special==="striped" && B.special==="striped"){
    for(let i=0;i<COLS;i++) board[r1][i]=null;
    for(let i=0;i<ROWS;i++) board[i][c1]=null;
    score+=200;
    return true;
  }

  if(A.special==="bomb" || B.special==="bomb"){
    let bomb=A.special==="bomb"?A:B;
    let other=A.special==="bomb"?B:A;

    for(let i=0;i<ROWS;i++)
      for(let j=0;j<COLS;j++)
        if(board[i][j] && board[i][j].type===other.type)
          board[i][j]=null;

    score+=150;
    return true;
  }

  return false;
}

/* CLICK */
function clickCell(r,c){
  if(moves<=0) return;

  if(!selected){
    selected=[r,c];
  } else {
    let [r1,c1]=selected;

    if(adjacent(r1,c1,r,c)){
      swap(r1,c1,r,c);

      if(comboSwap(r1,c1,r,c)){
        moves--;
        process();
      } else {
        let m=findMatches();
        if(m.length){
          moves--;
          process();
        } else {
          swap(r1,c1,r,c);
        }
      }

      checkEnd();
    }

    selected=null;
  }

  render();
}

/* GAME END */
function checkEnd(){
  if(score>=target){
    showPopup("🎉 Level Complete!");
  } else if(moves==0){
    showPopup("😢 You Lost!");
  }
}

function showPopup(text){
  resultText.innerText=text;
  popup.style.display="flex";
}

function nextLevel(){
  popup.style.display="none";
  level++;
  score=0;
  moves=20;
  target+=300;

  createBoard();
  process();
  render();
}

/* INIT */
const levelEl=document.getElementById("level");
const scoreEl=document.getElementById("score");
const movesEl=document.getElementById("moves");
const popup=document.getElementById("popup");
const resultText=document.getElementById("resultText");

createBoard();
process();
render();
</script>

</body>
</html>
