<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micron Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
.btn-gradient {
  background: linear-gradient(135deg, #ff8c00 0%, #ffdb01 100%);
  color: white;
}
.btn-gradient:hover {
  transform: scale(1.03);
}
</style>
</head>

<body class="bg-gray-50 font-sans">

<!-- HEADER -->
<header class="bg-white shadow px-4 py-3 flex justify-between items-center">
  <h1 class="font-bold text-xl">MICRON</h1>

  <div class="flex gap-3">
    <a href="YOUR_SCRIPT_URL?page=wallet" class="text-sm">Wallet</a>
    <a href="YOUR_SCRIPT_URL?page=refer" class="text-sm">Refer</a>
  </div>
</header>

<!-- USER -->
<section class="p-4 flex justify-between">
  <h2>Hi, <span id="userName">User</span></h2>

  <div class="flex gap-4">
    <a href="YOUR_SCRIPT_URL?page=notification">🔔</a>
    <a href="YOUR_SCRIPT_URL?page=profile">👤</a>
  </div>
</section>

<!-- STATS -->
<div class="grid grid-cols-3 gap-3 p-4 text-center">
  <div class="bg-white p-3 rounded">Courses<br><b id="courses">0</b></div>
  <div class="bg-white p-3 rounded">Earnings<br><b id="earnings">₹0</b></div>
  <div class="bg-white p-3 rounded">Certificates<br><b id="certs">0</b></div>
</div>

<!-- MAIN BUTTONS -->
<div class="grid grid-cols-2 gap-4 p-4">

<a href="YOUR_SCRIPT_URL?page=courses">
<button class="btn-gradient p-4 w-full rounded">Courses</button>
</a>

<a href="YOUR_SCRIPT_URL?page=games">
<button class="btn-gradient p-4 w-full rounded">Games</button>
</a>

<a href="YOUR_SCRIPT_URL?page=airesume">
<button class="btn-gradient p-4 w-full rounded">AI Resume</button>
</a>

<a href="YOUR_SCRIPT_URL?page=guidance">
<button class="btn-gradient p-4 w-full rounded">Guidance</button>
</a>

</div>

<!-- QUICK MENU -->
<div class="grid grid-cols-4 gap-2 px-4 pb-6 text-center text-xs">

<a href="YOUR_SCRIPT_URL?page=playlist">Playlist</a>
<a href="YOUR_SCRIPT_URL?page=wallet">Wallet</a>
<a href="YOUR_SCRIPT_URL?page=refer">Refer</a>
<a href="YOUR_SCRIPT_URL?page=offers">Offers</a>
<a href="YOUR_SCRIPT_URL?page=rank">Rank</a>

</div>

<!-- NEWS -->
<div class="p-4 bg-white">
  <h3 class="font-bold mb-2">News</h3>
  <div id="news"></div>
</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbytYGL4blI9ujg7VLuD15Pk60duqwclHbmUU8f9QVDAEgOXo-rtPB1__Az_nuvC46vV/exec";
const email = localStorage.getItem("email");

// 🔹 LOAD DASHBOARD DATA
fetch(`${SCRIPT_URL}?action=getDashboard&email=${email}`)
.then(res => res.json())
.then(data => {

  // stats
  if(data.stats.length){
    document.getElementById("courses").innerText = data.stats[0].Courses || 0;
    document.getElementById("earnings").innerText = "₹" + (data.stats[0].Earnings || 0);
    document.getElementById("certs").innerText = data.stats[0].Certificates || 0;
  }

  // news
  let newsHTML = "";
  data.news.forEach(n => {
    newsHTML += `<div class="text-sm mb-2">${n.headline}</div>`;
  });
  document.getElementById("news").innerHTML = newsHTML;

});

</script>

</body>
</html>
