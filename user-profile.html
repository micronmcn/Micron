<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | Micron</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #ff9800, #ffeb3b);
            --dark-text: #333;
            --light-gray: #f4f4f4;
            --white: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #fafafa;
            color: var(--dark-text);
        }

        /* --- Header --- */
        header {
            background: var(--white);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-weight: bold;
            font-size: 1.5rem;
            color: #ff9800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-container {
            position: relative;
        }

        .three-dot-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px 10px;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            background: var(--white);
            box-shadow: var(--shadow);
            border-radius: 8px;
            width: 180px;
            overflow: hidden;
            z-index: 10;
        }

        .dropdown-menu a {
            display: block;
            padding: 12px 20px;
            text-decoration: none;
            color: var(--dark-text);
            font-size: 0.9rem;
        }

        .dropdown-menu a:hover {
            background: var(--light-gray);
            color: #ff9800;
        }

        /* --- Hero Section --- */
        .hero {
            background: var(--primary-gradient);
            padding: 40px 5% 80px;
            color: #333;
        }

        .breadcrumb {
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .user-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--white);
            background: #eee;
            margin-bottom: 15px;
            object-fit: cover;
        }

        /* --- Content Section --- */
        .container {
            max-width: 800px;
            margin: -50px auto 50px;
            background: var(--white);
            padding: 30px;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .field {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #666;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
        }

        input:disabled {
            background-color: #fff;
            border-color: transparent;
            color: #000;
            font-weight: 500;
        }

        .referral-code {
            background: #fff8e1;
            border: 1px dashed #ff9800;
            padding: 10px;
            font-family: monospace;
            font-weight: bold;
            text-align: center;
        }

        .btn-group {
            grid-column: span 2;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 10px 25px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-edit {
            background: var(--primary-gradient);
            color: #333;
        }

        .btn-save {
            background: #4CAF50;
            color: white;
            display: none;
        }

        .btn-reset {
            background: #eee;
            color: #333;
        }

        /* --- Footer --- */
        footer {
            background: #333;
            color: white;
            padding: 40px 5%;
            text-align: center;
        }

        .footer-links {
            margin-bottom: 20px;
        }

        .footer-links a {
            color: #ffeb3b;
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.9rem;
        }

        .copyright {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .btn-group { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="https://via.placeholder.com/30/ff9800/ffffff?text=M" alt="Logo">
            Micron
        </div>
        <div class="menu-container">
            <button class="three-dot-btn" onclick="toggleMenu()">&#8942;</button>
            <div class="dropdown-menu" id="dropdownMenu">
                <a href="#">Settings</a>
                <a href="#">Analytics</a>
                <a href="#">Help Center</a>
                <a href="#">Logout</a>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="breadcrumb">Home > <strong>Profile</strong></div>
        <div class="profile-header">
            <img src="https://via.placeholder.com/120" alt="User" class="user-photo">
            <h2 id="display-name">John Doe</h2>
        </div>
    </section>

    <main class="container">
        <form id="profileForm" class="form-grid">
            <div class="field">
                <label>Full Name</label>
                <input type="text" value="John Doe" disabled class="editable">
            </div>
            <div class="field">
                <label>Date of Birth</label>
                <input type="date" value="1995-05-15" disabled class="editable">
            </div>
            <div class="field">
                <label>Email Address</label>
                <input type="email" value="john.doe@example.com" disabled class="editable">
            </div>
            <div class="field">
                <label>Contact Number</label>
                <input type="tel" value="+1 234 567 890" disabled class="editable">
            </div>
            <div class="field" style="grid-column: span 2;">
                <label>Address</label>
                <textarea rows="2" disabled class="editable">123 Tech Lane, Silicon Valley, CA</textarea>
            </div>
            <div class="field">
                <label>Qualification</label>
                <input type="text" value="B.Tech Computer Science" disabled class="editable">
            </div>
            <div class="field">
                <label>Work Experience</label>
                <input type="text" value="5 Years" disabled class="editable">
            </div>
            <div class="field">
                <label>Unique Referral Code</label>
                <div class="referral-code">MICRON-2026-XYZ</div>
            </div>
            <div class="field">
                <label>Password Management</label>
                <button type="button" class="btn-reset">Reset Password</button>
            </div>

            <div class="btn-group">
                <button type="button" class="btn-edit" id="editBtn" onclick="enableEditing()">Edit Profile</button>
                <button type="submit" class="btn-save" id="saveBtn">Save Changes</button>
            </div>
        </form>
    </main>

    <footer>
        <div class="footer-links">
            <a href="#" onclick="alert('Privacy Policy Content')">Privacy & Policy</a> | 
            <a href="#" onclick="alert('Terms & Conditions Content')">Terms & Conditions</a> |
            <a href="#">Support</a> |
            <a href="#">Community</a>
        </div>
        <div class="copyright">
            &copy; 2026 Micron | All Rights Reserved
        </div>
    </footer>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('dropdownMenu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        // Close menu if clicked outside
        window.onclick = function(event) {
            if (!event.target.matches('.three-dot-btn')) {
                document.getElementById('dropdownMenu').style.display = 'none';
            }
        }

        function enableEditing() {
            const inputs = document.querySelectorAll('.editable');
            inputs.forEach(input => {
                input.disabled = false;
                input.style.borderColor = '#ff9800';
            });
            document.getElementById('editBtn').style.display = 'none';
            document.getElementById('saveBtn').style.display = 'inline-block';
        }

        document.getElementById('profileForm').onsubmit = function(e) {
            e.preventDefault();
            const inputs = document.querySelectorAll('.editable');
            inputs.forEach(input => {
                input.disabled = true;
                input.style.borderColor = 'transparent';
            });
            document.getElementById('editBtn').style.display = 'inline-block';
            document.getElementById('saveBtn').style.display = 'none';
            alert('Profile updated successfully!');
        };
    </script>
    <script>
        // 1. Get the email passed from Apps Script
const userEmailFromUrl = "<?= userEmail ?>"; 

// 2. Run on page load
window.onload = function() {
    if (userEmailFromUrl) {
        google.script.run
            .withSuccessHandler(populateFields)
            .getUserProfile(userEmailFromUrl);
    }
};

function populateFields(data) {
    if (!data) {
        alert("User data not found!");
        return;
    }
    
    // Fill the inputs (Matching the order of your 'editable' class inputs)
    const inputs = document.querySelectorAll('.editable');
    document.getElementById('display-name').innerText = data.name;
    
    inputs[0].value = data.name;
    inputs[1].value = data.dob; // Must be yyyy-mm-dd
    inputs[2].value = data.email;
    inputs[3].value = data.contact;
    inputs[4].value = data.address; // Textarea
    inputs[5].value = data.qualification;
    inputs[6].value = data.experience;
    
    document.querySelector('.referral-code').innerText = data.referral;
}

// 3. Handle Save Changes
document.getElementById('profileForm').onsubmit = function(e) {
    e.preventDefault();
    const inputs = document.querySelectorAll('.editable');
    
    const updatedData = {
        name: inputs[0].value,
        dob: inputs[1].value,
        email: inputs[2].value,
        contact: inputs[3].value,
        address: inputs[4].value,
        qualification: inputs[5].value,
        experience: inputs[6].value
    };

    google.script.run.withSuccessHandler(function(res) {
        if(res === "Success") {
            alert("Profile updated successfully!");
            location.reload(); // Re-locks inputs
        } else {
            alert(res);
        }
    }).updateProfile(updatedData);
};

    </script>
</body>
</html>
