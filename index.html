<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micron - Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">MICRON</div>
            <div class="nav-buttons">
                <button class="signup-btn">Signup</button>
                <button class="menu-dots">...</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero-section">
            <div class="hero-content">
                <h1>Welcome to Micron Platform</h1>
                <p>The one-stop shop for course sections and timelines that guide you at every step.</p>
                <button class="get-start-btn">Get Start</button>
            </div>
            
            <div class="floating-signup">
                <h3>Signup</h3>
                <input type="text" placeholder="Full Name">
                <input type="date" placeholder="Date of Birth">
                <input type="email" placeholder="Email">
                <input type="text" placeholder="Contact">
                <input type="text" placeholder="Referral Code">
                <input type="password" placeholder="Set Password">
                <button class="form-signup-btn">Signup</button>
            </div>
        </section>

        <section class="info-container">
            <div class="text-content">
                <div class="info-block">
                    <h2>About</h2>
                    <div class="line-placeholder"></div>
                    <div class="line-placeholder"></div>
                </div>

                <div class="info-block">
                    <h2>Why Choose Us</h2>
                    <div class="line-placeholder"></div>
                    <div class="line-placeholder"></div>
                </div>

                <div class="info-block">
                    <h2>Mission</h2>
                    <div class="line-placeholder"></div>
                </div>

                <div class="info-block">
                    <h2>Vision</h2>
                    <div class="line-placeholder"></div>
                </div>
            </div>

            <div class="login-box">
                <h3>Login</h3>
                <input type="text" placeholder="User ID">
                <input type="password" placeholder="Password">
                <a href="#" class="forgot-pass">Forgot Password</a>
                <button class="login-btn">Signup</button>
                <button class="login-btn-secondary">Signup</button>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-links">
            <span>Privacy Policy</span>
            <span>Terms & Conditions</span>
            <span>Support</span>
            <span>Links</span>
            <span>Offers</span>
            <span>Settings</span>
        </div>
        <p>©2026 Micron | All Rights Reserved</p>
    </footer>

</body>
</html>
