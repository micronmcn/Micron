<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micron Platform</title>
    <style>
        :root {
            --primary-orange: #d35400;
            --bg-cream: #fdf2d9;
            --text-dark: #333;
            --white: #ffffff;
            --gray-line: #666;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* Header */
        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }

        .logo {
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-sm {
            background: var(--primary-orange);
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* Hero Section */
        .hero {
            background-color: var(--bg-cream);
            padding: 40px 25px;
            position: relative;
        }

        .hero h1 {
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .btn-main {
            background: var(--primary-orange);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            margin-top: 15px;
            cursor: pointer;
        }

        /* Signup Modal (Floating Overlay style) */
        .signup-overlay {
            background: white;
            width: 75%;
            margin: -60px auto 20px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }

        .signup-overlay h2 {
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        input {
            width: 100%;
            padding: 8px 12px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.85rem;
        }

        .btn-block {
            width: 100%;
            background: var(--primary-orange);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 5px;
        }

        /* Info Sections (About, Why Choose Us, etc.) */
        .info-section {
            padding: 20px 25px;
        }

        .info-section h3 {
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .list-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: #f1c40f;
            border-radius: 50%;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .line-placeholder {
            height: 4px;
            background-color: var(--gray-line);
            border-radius: 2px;
            width: 100%;
        }

        .line-short { width: 70%; }
        .line-med { width: 85%; }

        /* Login Card */
        .login-card {
            margin: 20px;
            padding: 25px;
            background: #f9f9f9;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.75rem;
            color: #666;
            margin-bottom: 15px;
            text-decoration: none;
        }

        .login-card .alt-signup {
            text-align: center;
            display: block;
            font-size: 0.8rem;
            color: var(--primary-orange);
            margin-top: 10px;
            text-decoration: none;
        }

        /* Footer */
        footer {
            margin-top: auto;
            background: #f0f0f0;
            padding: 20px;
            text-align: center;
            font-size: 0.75rem;
        }

        .footer-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 15px;
        }

        .footer-links a {
            color: #333;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">MICRON</div>
        <div class="nav-buttons">
            <button class="btn-sm">Signup</button>
            <button class="btn-sm" style="padding: 5px 10px;">•••</button>
        </div>
    </header>

    <section class="hero">
        <h1>Welcome to Micron Platform</h1>
        <p>The ohenson man course sectims</p>
        <p>The timeline gueas at others</p>
        <button class="btn-main">Get Start</button>
    </section>

    <div class="signup-overlay">
        <h2>Signup</h2>
        <input type="text" placeholder="Full Name">
        <input type="text" placeholder="Date of Birth">
        <input type="email" placeholder="Email">
        <input type="text" placeholder="Contact">
        <input type="text" placeholder="Referral Code">
        <input type="password" placeholder="Set Password">
        <button class="btn-block">Signup</button>
    </div>

    <section class="info-section">
        <h3>About</h3>
        <div class="list-item"><div class="dot"></div><div class="line-placeholder"></div></div>
        <div class="list-item"><div class="dot"></div><div class="line-placeholder line-med"></div></div>
        <div class="list-item"><div class="dot"></div><div class="line-placeholder line-short"></div></div>
        <div class="list-item"><div class="dot"></div><div class="line-placeholder"></div></div>
    </section>

    <section class="info-section">
        <h3>Why Choose Us</h3>
        <div class="list-item"><div class="dot"></div><div class="line-placeholder line-med"></div></div>
        <div class="list-item"><div class="dot"></div><div class="line-placeholder"></div></div>
        <div class="list-item"><div class="dot"></div><div class="line-placeholder line-short"></div></div>
    </section>

    <section class="info-section">
        <h3>Mission</h3>
        <div class="line-placeholder" style="margin-bottom: 10px;"></div>
        <div class="line-placeholder line-med" style="margin-bottom: 10px;"></div>
        
        <h3 style="margin-top: 20px;">Vision</h3>
        <div class="line-placeholder" style="margin-bottom: 10px;"></div>
        <div class="line-placeholder line-med" style="margin-bottom: 10px;"></div>
    </section>

    <div class="login-card">
        <h3 style="margin-bottom: 15px;">Login</h3>
        <input type="text" placeholder="User ID">
        <input type="password" placeholder="Password">
        <a href="#" class="forgot-link">Forgot Password</a>
        <button class="btn-block">Signup</button>
        <a href="#" class="alt-signup">Signup</a>
    </div>

    <footer>
        <div class="footer-links">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms & Conditions</a>
            <a href="#">Support</a>
            <a href="#">Links</a>
            <a href="#">Offers</a>
            <a href="#">Settings</a>
        </div>
        <p>©2026 Micron | All Rights Reserved</p>
    </footer>
</div>

</body>
</html>
