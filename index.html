<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micron | Innovation Redefined</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
.gradient-btn {
    background: linear-gradient(90deg, #FF8C00 0%, #FFD700 100%);
}
.modal {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}
.modal.active { display:flex; }
.dropdown { display:none; position:absolute; right:0; top:100%; background:#fff; }
.dropdown.active { display:block; }
</style>
</head>

<body class="bg-gray-50">

<header class="bg-white shadow p-4 flex justify-between">
<h1 class="font-bold text-xl">MICRON</h1>

<div class="flex gap-3 relative">
<button onclick="toggleModal('signupModal')" class="gradient-btn px-4 py-2 text-white rounded">Signup</button>
<button onclick="toggleDropdown()">☰</button>

<div id="menuDropdown" class="dropdown border p-2">
<a href="user-dashboard.html">Dashboard</a>
</div>
</div>
</header>

<section class="text-center py-16">
<h2 class="text-4xl font-bold">Welcome to Micron</h2>
<p class="text-gray-600 mt-3">Learn • Earn • Grow</p>
<button onclick="toggleModal('signupModal')" class="gradient-btn mt-6 px-6 py-3 text-white rounded">Get Started</button>
</section>

<!-- LOGIN -->
<section class="max-w-md mx-auto bg-white p-6 rounded shadow">
<h3 class="text-xl font-bold mb-4 text-center">Login</h3>

<input id="loginEmail" type="email" placeholder="Email" class="w-full border p-2 mb-3">
<input id="loginPassword" type="password" placeholder="Password" class="w-full border p-2 mb-3">

<button onclick="handleLogin()" class="gradient-btn w-full py-2 text-white rounded">Login</button>
</section>

<!-- SIGNUP MODAL -->
<div id="signupModal" class="modal">
<div class="bg-white p-6 rounded w-96">

<h3 class="text-xl font-bold mb-4">Signup</h3>

<input id="name" placeholder="Full Name" class="w-full border p-2 mb-2">
<input id="dob" type="date" class="w-full border p-2 mb-2">
<input id="email" placeholder="Email" class="w-full border p-2 mb-2">
<input id="contact" placeholder="Contact" class="w-full border p-2 mb-2">
<input id="ref" placeholder="Referral Code" class="w-full border p-2 mb-2">
<input id="pass" type="password" placeholder="Password" class="w-full border p-2 mb-3">

<button onclick="submitSignup()" class="gradient-btn w-full py-2 text-white rounded">Register</button>

</div>
</div>

<script>
const API_URL = "YOUR_WEB_APP_URL";

// UI
function toggleModal(id){
document.getElementById(id).classList.toggle("active");
}
function toggleDropdown(){
document.getElementById("menuDropdown").classList.toggle("active");
}

// SIGNUP
async function submitSignup(){
const data = {
action:"signup",
fullName: document.getElementById("name").value,
dob: document.getElementById("dob").value,
email: document.getElementById("email").value,
contact: document.getElementById("contact").value,
referral: document.getElementById("ref").value,
password: document.getElementById("pass").value
};

const res = await fetch(API_URL,{
method:"POST",
body: JSON.stringify(data)
});

const result = await res.json();

if(result.status==="success"){
alert("Signup Success");
toggleModal('signupModal');
}else{
alert("Error");
}
}

// LOGIN
async function handleLogin(){
const data = {
action:"login",
email: document.getElementById("loginEmail").value,
password: document.getElementById("loginPassword").value
};

const res = await fetch(API_URL,{
method:"POST",
body: JSON.stringify(data)
});

const result = await res.json();

if(result.status==="success"){
localStorage.setItem("user", result.email);
localStorage.setItem("name", result.user);

// redirect
window.location.href="user-dashboard.html";
}else{
alert(result.message);
}
}

// CLOSE DROPDOWN
window.onclick = function(e){
if(!e.target.closest('.relative')){
document.getElementById("menuDropdown").classList.remove("active");
}
}
</script>

</body>
</html>
