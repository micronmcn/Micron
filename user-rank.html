<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micron - Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .gradient-orange { background: linear-gradient(135deg, #ff9800 0%, #ffc107 100%); }
    </style>
</head>
<body class="max-w-md mx-auto bg-white min-h-screen flex flex-col">

    <header class="p-4 flex items-center justify-between border-b bg-white">
        <div class="flex items-center gap-2">
            <div class="bg-orange-500 text-white w-8 h-8 flex items-center justify-center rounded-lg font-bold">M</div>
            <span class="font-black text-xl tracking-tight text-slate-800 uppercase">Micron</span>
        </div>
        </header>

    <section class="p-6">
        <h1 class="text-3xl font-bold text-slate-800">Leaderboard</h1>
        <p class="text-orange-500 font-semibold mt-1">Your Rank: #12</p>
    </section>

    <div class="flex px-6 border-b">
        <button class="pb-2 px-4 border-b-2 border-orange-500 text-orange-500 font-bold">Weekly</button>
        <button class="pb-2 px-4 text-slate-400 font-semibold">All-Time</button>
        <div class="ml-auto flex items-center gap-1 text-orange-600 font-bold">
            <i class="fas fa-trophy"></i> 12
        </div>
    </div>

    <div class="flex justify-center items-end gap-4 p-8 bg-slate-50">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 bg-slate-300 rounded-full mb-2 flex items-center justify-center text-slate-600 shadow-md">
                <i class="fas fa-medal"></i>
            </div>
            <span class="text-xs font-bold">PlayerOne#2</span>
            <div class="h-12 w-16 bg-slate-200 mt-1 rounded-t-lg flex items-center justify-center text-slate-400 font-bold">#2</div>
        </div>
        <div class="flex flex-col items-center">
            <div class="w-16 h-16 border-4 border-orange-400 bg-orange-100 rounded-full mb-2 flex items-center justify-center text-orange-500 shadow-lg relative">
                <i class="fas fa-crown absolute -top-4 text-orange-500 text-xl"></i>
                <i class="fas fa-trophy text-2xl"></i>
            </div>
            <span class="text-sm font-black">User99</span>
            <div class="h-20 w-20 gradient-orange mt-1 rounded-t-lg flex items-center justify-center text-white font-bold text-xl shadow-inner">#1</div>
        </div>
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 bg-orange-200 rounded-full mb-2 flex items-center justify-center text-orange-700 shadow-md">
                <i class="fas fa-medal"></i>
            </div>
            <span class="text-xs font-bold">User#3</span>
            <div class="h-10 w-16 bg-orange-100 mt-1 rounded-t-lg flex items-center justify-center text-orange-300 font-bold">#3</div>
        </div>
    </div>

    <div class="flex-grow">
        <div class="grid grid-cols-6 px-6 py-2 bg-slate-100 text-xs font-bold text-slate-500 uppercase">
            <span>Rank</span>
            <span class="col-span-3">Username</span>
            <span class="col-span-2 text-right">Score</span>
        </div>

        <div class="divide-y">
            <div class="grid grid-cols-6 px-6 py-4 items-center">
                <span class="font-bold text-slate-400">#1</span>
                <div class="col-span-3 flex items-center gap-3">
                    <div class="w-8 h-8 bg-slate-200 rounded-full flex items-center justify-center text-slate-400"><i class="fas fa-user"></i></div>
                    <span class="font-bold text-slate-700">User99</span>
                </div>
                <span class="col-span-2 text-right font-black text-slate-800">20,000 XP</span>
            </div>

            <div class="grid grid-cols-6 px-6 py-4 items-center bg-orange-50 border-y-2 border-orange-200">
                <span class="font-bold text-orange-600">#12</span>
                <div class="col-span-3 flex items-center gap-3">
                    <div class="w-8 h-8 bg-orange-500 rounded-full flex items-center justify-center text-white"><i class="fas fa-user"></i></div>
                    <span class="font-black text-orange-700">User123</span>
                </div>
                <span class="col-span-2 text-right font-black text-orange-600">8,500 XP</span>
            </div>

            <div class="grid grid-cols-6 px-6 py-4 items-center">
                <span class="font-bold text-slate-400">#13</span>
                <div class="col-span-3 flex items-center gap-3">
                    <div class="w-8 h-8 bg-slate-200 rounded-full flex items-center justify-center text-slate-400"><i class="fas fa-user"></i></div>
                    <span class="font-bold text-slate-700">ProGamer</span>
                </div>
                <span class="col-span-2 text-right font-black text-slate-800">8,000 XP</span>
            </div>
        </div>
    </div>

    <footer class="p-8 text-center bg-slate-50 mt-auto">
        <div class="flex justify-center gap-4 text-blue-500 text-sm font-semibold mb-4">
            <a href="#">Privacy & Policy</a>
            <span class="text-slate-300">|</span>
            <a href="#">Terms & Conditions</a>
        </div>
        <p class="text-slate-400 text-xs">© 2026 Micron | All Rights Reserved</p>
    </footer>

</body>
</html>
