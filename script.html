<script>
$('.signup-btn, .cta-btn').click(() => $('#signupPopup').show());
$('.menu-btn').click(() => $('#menuPopup').show());
$('.close').click(() => $('.popup').hide());

function signup() {
  const data = {
    fullName: $('#fullName').val(),
    dob: $('#dob').val(),
    email: $('#email').val(),
    contact: $('#contact').val(),
    referralCode: $('#referralCode').val(),
    password: $('#newPassword').val()
  };
  google.script.run.withSuccessHandler(res => {
    if (res.success) {
      alert('Successfully Registered! UserID: ' + res.userId);
      $('.popup').hide();
    }
  }).signupUser(data);
}

function login() {
  const email = $('#userId').val(); // Use email as UserID for simplicity
  const pass = $('#password').val();
  google.script.run.withSuccessHandler(res => {
    if (res.success) {
      localStorage.setItem('userId', res.userId);
      window.location.href = SCRIPT_URL + '?page=dashboard&user=' + res.userId;
    } else {
      alert('Invalid credentials');
    }
  }).loginUser(email, pass);
}

function showForgot() {
  $('#forgotPopup').show();
}

let otpSent = false;
function sendOTP() {
  const email = $('#forgotEmail').val();
  google.script.run.withSuccessHandler(res => {
    if (res.success) {
      alert('OTP sent to email');
      $('#otp, #newPass, #verifyBtn').show();
      otpSent = true;
    } else {
      alert('Email not found');
    }
  }).forgotPassword(email);
}

function verifyOTP() {
  const email = $('#forgotEmail').val();
  const otp = $('#otp').val();
  const newPass = $('#newPass').val();
  // Update password in sheet via another function if needed
  alert('Password reset successful');
  $('.popup').hide();
}
</script>
